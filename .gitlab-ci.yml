stages:
    - test
    - package
    - deploy

test:
    image: node:19-alpine
    stage: test
    script:
        - npm install
        - npm run lint
        - npm run test:unit -- --coverage 
    cache:
        key: "$CI_COMMIT_REF_SLUG"
        paths:
            - node_modules
    artifacts:
      reports:
          junit: junit.xml
          coverage_report:
            coverage_format: cobertura
            path: coverage/cobertura-coverage.xml

build-artifacts:
    image: node:19-alpine
    stage: package
    script:
        - npm install
        - npm run build
        - echo "$CI_COMMIT_REF_NAME" > dist/DEPLOY_ID
        - echo "$CI_COMMIT_SHA" >> dist/DEPLOY_ID
        - echo "$CI_JOB_STARTED_AT" >> dist/DEPLOY_ID
    artifacts:
        name: "shutterbug-$CI_COMMIT_REF_NAME"
        paths:
            - dist
    cache:
        key: "$CI_COMMIT_REF_SLUG"
        paths:
            - node_modules

